<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <!-- Title -->
  <title>EVA Architecture Overview</title>
  
  <!-- Background -->
  <rect x="0" y="0" width="800" height="400" fill="#f8f9fa"/>
  
  <!-- Title Text -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333">
    EVA Architecture - High Level
  </text>
  
  <!-- Frontend Component -->
  <rect x="50" y="80" width="150" height="80" rx="8" fill="#4A90E2" stroke="#2E5C8A" stroke-width="2"/>
  <text x="125" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
    Frontend
  </text>
  <text x="125" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    React/TypeScript
  </text>
  <text x="125" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    Vite SPA
  </text>
  
  <!-- Backend API Component -->
  <rect x="325" y="80" width="150" height="80" rx="8" fill="#7ED321" stroke="#5A9A19" stroke-width="2"/>
  <text x="400" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
    Backend API
  </text>
  <text x="400" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    Python/Quart
  </text>
  <text x="400" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    RAG Logic
  </text>
  
  <!-- Azure OpenAI Component -->
  <rect x="600" y="80" width="150" height="80" rx="8" fill="#F5A623" stroke="#C47F1A" stroke-width="2"/>
  <text x="675" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
    Azure OpenAI
  </text>
  <text x="675" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    GPT-4
  </text>
  <text x="675" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    Embeddings
  </text>
  
  <!-- Azure Search Component -->
  <rect x="325" y="240" width="150" height="80" rx="8" fill="#BD10E0" stroke="#8A0CA8" stroke-width="2"/>
  <text x="400" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
    Azure Search
  </text>
  <text x="400" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    Hybrid Search
  </text>
  <text x="400" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    Vector + Keyword
  </text>
  
  <!-- Cosmos DB Component -->
  <rect x="600" y="240" width="150" height="80" rx="8" fill="#50E3C2" stroke="#3AAA93" stroke-width="2"/>
  <text x="675" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
    Cosmos DB
  </text>
  <text x="675" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    Sessions
  </text>
  <text x="675" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    Audit Logs
  </text>
  
  <!-- Arrows -->
  <!-- Frontend to Backend -->
  <line x1="200" y1="120" x2="325" y2="120" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="262" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">
    HTTP/REST
  </text>
  
  <!-- Backend to Azure OpenAI -->
  <line x1="475" y1="120" x2="600" y2="120" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="537" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">
    Completions
  </text>
  
  <!-- Backend to Azure Search -->
  <line x1="400" y1="160" x2="400" y2="240" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="420" y="200" font-family="Arial, sans-serif" font-size="10" fill="#333">
    Query
  </text>
  
  <!-- Backend to Cosmos DB -->
  <line x1="475" y1="140" x2="600" y2="260" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="540" y="195" font-family="Arial, sans-serif" font-size="10" fill="#333">
    Store
  </text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Legend -->
  <text x="50" y="370" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">
    Legend:
  </text>
  <rect x="110" y="360" width="15" height="15" fill="#4A90E2"/>
  <text x="130" y="372" font-family="Arial, sans-serif" font-size="10" fill="#333">UI Layer</text>
  
  <rect x="210" y="360" width="15" height="15" fill="#7ED321"/>
  <text x="230" y="372" font-family="Arial, sans-serif" font-size="10" fill="#333">API Layer</text>
  
  <rect x="320" y="360" width="15" height="15" fill="#F5A623"/>
  <text x="340" y="372" font-family="Arial, sans-serif" font-size="10" fill="#333">AI Services</text>
  
  <rect x="440" y="360" width="15" height="15" fill="#BD10E0"/>
  <text x="460" y="372" font-family="Arial, sans-serif" font-size="10" fill="#333">Search Services</text>
  
  <rect x="580" y="360" width="15" height="15" fill="#50E3C2"/>
  <text x="600" y="372" font-family="Arial, sans-serif" font-size="10" fill="#333">Data Storage</text>
</svg>
